<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Tournament Timer</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-dark-gray: #181818;
            --spotify-light-gray: #282828;
            --spotify-white: #FFFFFF;
            --spotify-text-gray: #B3B3B3;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--spotify-black);
            color: var(--spotify-white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 750px; /* Expanded by 50% */
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        .glass {
            background: var(--spotify-dark-gray);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--spotify-white);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 500px; /* Spotify style pills */
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn-primary {
            background-color: var(--spotify-green);
            color: var(--spotify-black);
        }

        .btn-primary:hover {
            transform: scale(1.04);
            background-color: #1ed760;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--spotify-white);
            border: 1px solid var(--spotify-text-gray);
        }

        .btn-secondary:hover {
            border-color: var(--spotify-white);
            transform: scale(1.04);
        }

        .timer-view {
            display: none;
            position: relative;
        }

        .timer-display {
            font-size: 9rem; /* Increased size */
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 1.5rem 0; /* Centered with more margin */
            letter-spacing: -4px;
        }

        @keyframes pulse-warning {
            0% { box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
            50% { box-shadow: 0 0 20px 5px rgba(251, 191, 36, 0.4); }
            100% { box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        }

        .pulse {
            animation: pulse-warning 1s infinite;
        }

        .signal-container {
            height: 150px; /* Increased height */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 1rem;
            transition: opacity 0.3s ease;
        }

        .signal-icon {
            font-size: 5rem; /* Increased size */
            margin-bottom: 0.5rem;
        }

        .signal-text {
            font-size: 1.75rem; /* Increased size */
            font-weight: 600;
            color: #fbbf24;
        }

        .slider-container {
            width: 100%;
            margin: 2rem 0;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type="range"]:focus {
            outline: none;
        }

        /* Track */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px; /* Slightly thicker */
            cursor: pointer;
            background: var(--spotify-light-gray);
            border-radius: 3px;
        }
        input[type="range"]:hover::-webkit-slider-runnable-track {
            background: var(--spotify-text-gray);
        }

        /* Thumb */
        input[type="range"]::-webkit-slider-thumb {
            height: 16px; /* Larger thumb */
            width: 16px;
            border-radius: 50%;
            background: var(--spotify-white);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -4px;
            opacity: 1; /* Always visible as requested */
            transition: transform 0.2s;
        }
        .slider-container:hover input[type="range"]::-webkit-slider-thumb {
            transform: scale(1.2);
        }
        input[type="range"]:active::-webkit-slider-thumb {
            background: var(--spotify-green);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--spotify-text-gray);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: var(--spotify-white);
            transform: scale(1.1);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .play-btn {
            width: 56px;
            height: 56px;
            background: var(--spotify-white);
            color: var(--spotify-black);
            border-radius: 50%;
        }
        
        .play-btn svg {
            color: var(--spotify-black) !important;
        }

        .play-btn:hover {
            transform: scale(1.06);
            background: var(--spotify-white); /* Keep white background */
            color: var(--spotify-black); /* Keep black icon */
        }

        .stop-btn {
            width: 56px;
            height: 56px;
            background: var(--danger);
            color: var(--spotify-white);
            border-radius: 50%;
        }
        
        .stop-btn svg {
            color: var(--spotify-white) !important;
        }

        .stop-btn:hover:not(:disabled) {
            transform: scale(1.06);
            background: #ff5f5f;
        }

        .stop-btn:disabled {
            background: var(--spotify-light-gray);
            color: var(--spotify-text-gray);
            opacity: 0.5;
        }

        .stop-btn:disabled svg {
            color: var(--spotify-text-gray) !important;
        }

        .back-btn {
            position: absolute;
            top: -1.5rem; /* More spacing above */
            left: 0;
            font-size: 0.9rem;
            color: var(--spotify-text-gray);
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .back-btn:hover { color: var(--spotify-white); }

        .mode-label {
            font-size: 0.9rem;
            color: var(--spotify-text-gray);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 1rem; /* Spacing under back button */
            margin-bottom: 1.5rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Menu -->
        <div id="main-menu" class="glass">
            <h1>Speech Timers</h1>
            <div class="menu">
                <button class="btn btn-secondary" onclick="setMode('imp_prep')">Prep (2:00)</button>
                <button class="btn btn-primary" onclick="setMode('imp_speech')">Impromptu (IMP)</button>
                <button class="btn btn-primary" onclick="setMode('storytelling')">Storytelling</button>
                <button class="btn btn-primary" onclick="setMode('xtmp')">XTMP (5 Down)</button>
                <button class="btn btn-primary" onclick="setMode('else')">Other Speech Events (2 Down)</button>
            </div>
        </div>

        <!-- Timer View -->
        <div id="timer-view" class="glass timer-view">
            <button class="back-btn" onclick="goBack()"><i data-lucide="chevron-left"></i> Back</button>
            <div id="mode-display" class="mode-label">Mode</div>
            
            <div id="signal-container" class="signal-container">
                <div id="signal-icon" class="signal-icon"></div>
                <div id="signal-text" class="signal-text"></div>
            </div>

            <div id="timer-display" class="timer-display">00:00</div>

            <div class="slider-container">
                <input type="range" id="timer-slider" min="0" max="700" value="0" oninput="handleSliderChange(this.value)">
            </div>

            <div class="controls">
                <button id="reset-btn" class="control-btn" onclick="resetTimer()" title="Reset">
                    <i data-lucide="rotate-ccw"></i>
                </button>
                <button id="start-btn" class="control-btn play-btn" onclick="toggleTimer()" title="Start">
                    <i id="play-icon" data-lucide="play"></i>
                </button>
                <button id="stop-btn" class="control-btn stop-btn" onclick="stopTimer()" disabled title="Stop">
                    <i data-lucide="square"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let timerInterval = null;
        let seconds = 0;
        let currentMode = '';
        let isRunning = false;
        let lastSignalTime = -1;

        const modes = {
            xtmp: {
                name: "XTMP 5 Down",
                maxTime: 700, // Show signals up to 11:40
                signals: [
                    { time: 120, icon: '🖐️', text: '5 Fingers' },
                    { time: 180, icon: '🖖', text: '4 Fingers' },
                    { time: 240, icon: '🤟', text: '3 Fingers' },
                    { time: 300, icon: '✌️', text: '2 Fingers' },
                    { time: 360, icon: '☝️', text: '1 Finger' },
                    { time: 390, icon: '©️', text: 'Hold up a C' },
                    { time: 420, icon: '✊', text: 'Fist' },
                    { time: 450, icon: '❌', text: 'Grace Period Ended<br><small>CANNOT BE RANKED FIRST IN ROUND</small>' },
                    { time: 660, icon: '✋', text: 'Over Time:<br>Stop Speaker Politely' }
                ]
            },
            imp_prep: {
                name: "Impromptu Prep",
                maxTime: 180, // 3:00 to allow for a bit of overage
                signals: [
                    { time: 60, icon: '☝️', text: '1 Minute Prep Remaining' },
                    { time: 90, icon: '©️', text: '30 Seconds Prep Remaining' },
                    { time: 120, icon: '✊', text: 'Prep Time Up' }
                ]
            },
            imp_speech: {
                name: "Impromptu (IMP)",
                maxTime: 700, // Show signals up to 11:40
                signals: [
                    { time: 60, icon: '✌️', text: '2 Fingers' },
                    { time: 120, icon: '☝️', text: '1 Finger' },
                    { time: 150, icon: '©️', text: 'Hold up a C' },
                    { time: 180, icon: '✊', text: 'Fist' },
                    { time: 210, icon: '❌', text: 'Grace Period Ended<br><small>CANNOT BE RANKED FIRST IN ROUND</small>' },
                    { time: 660, icon: '✋', text: 'Over Time:<br>Stop Speaker Politely' }
                ]
            },
            storytelling: {
                name: "Storytelling",
                maxTime: 700,
                signals: [
                    { time: 180, icon: '✌️', text: '2 Fingers' },
                    { time: 240, icon: '☝️', text: '1 Finger' },
                    { time: 270, icon: '©️', text: 'Hold up a C' },
                    { time: 300, icon: '✊', text: 'Fist' },
                    { time: 330, icon: '❌', text: 'Grace Period Ended<br><small>CANNOT BE RANKED FIRST IN ROUND</small>' },
                    { time: 660, icon: '✋', text: 'Over Time:<br>Stop Speaker Politely' }
                ]
            },
            else: {
                name: "Other Speech Events",
                maxTime: 900, // Show signals up to 15 mins
                signals: [
                    { time: 480, icon: '✌️', text: '2 Fingers' },
                    { time: 540, icon: '☝️', text: '1 Finger' },
                    { time: 570, icon: '©️', text: 'Hold up a C' },
                    { time: 600, icon: '✊', text: 'Fist' },
                    { time: 630, icon: '❌', text: 'Grace Period Ended<br><small>CANNOT BE RANKED FIRST IN ROUND</small>' },
                    { time: 660, icon: '✋', text: 'Over Time:<br>Stop Speaker Politely' }
                ]
            }
        };

        function initIcons() {
            lucide.createIcons();
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('timer-view').style.display = 'block';
            document.getElementById('mode-display').innerText = modes[mode].name;
            document.getElementById('timer-slider').max = modes[mode].maxTime;
            resetTimer();
            initIcons();
        }

        function goBack() {
            stopTimer();
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('timer-view').style.display = 'none';
        }

        function toggleTimer() {
            if (isRunning) {
                stopTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('start-btn').innerHTML = '<i data-lucide="pause"></i>';
            document.getElementById('stop-btn').disabled = false;
            
            // Clear initial prompt immediately
            if (seconds === 0) {
                clearSignals();
            }
            
            initIcons();
            
            timerInterval = setInterval(() => {
                seconds++;
                updateDisplay();
                checkSignals();
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-btn').innerHTML = '<i data-lucide="play"></i>';
            document.getElementById('stop-btn').disabled = true;
            document.getElementById('timer-view').classList.remove('pulse');
            initIcons();
            
            // Re-show prompt if stopped at 0
            if (seconds === 0) {
                showInitialPrompt();
            }
        }

        function resetTimer() {
            stopTimer();
            seconds = 0;
            lastSignalTime = -1;
            updateDisplay();
            showInitialPrompt();
        }

        function showInitialPrompt() {
            document.getElementById('signal-icon').innerHTML = '<i data-lucide="message-square"></i>';
            document.getElementById('signal-text').innerText = 'Ask: Would you like time signals?';
            document.getElementById('signal-container').style.opacity = '1';
            document.getElementById('signal-text').style.color = 'var(--spotify-text-gray)';
            initIcons();
        }

        function handleSliderChange(val) {
            seconds = parseInt(val);
            updateDisplay();
            checkSignals();
        }

        function updateDisplay() {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            document.getElementById('timer-display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('timer-slider').value = seconds;
        }

        function clearSignals() {
            document.getElementById('signal-icon').innerHTML = '';
            document.getElementById('signal-text').innerHTML = '';
            document.getElementById('signal-container').style.opacity = '0';
        }

        function checkSignals() {
            if (seconds === 0 && !isRunning) {
                showInitialPrompt();
                return;
            }

            const modeSignals = modes[currentMode].signals;
            const view = document.getElementById('timer-view');
            
            // Check for pulsing warning 5s before any signal
            let isNearSignal = false;
            for (const signal of modeSignals) {
                if (seconds >= signal.time - 5 && seconds < signal.time) {
                    isNearSignal = true;
                    break;
                }
            }
            
            if (isNearSignal) {
                view.classList.add('pulse');
            } else {
                view.classList.remove('pulse');
            }

            // Find the most recent signal that has been passed
            let currentSignal = null;
            for (let i = modeSignals.length - 1; i >= 0; i--) {
                if (seconds >= modeSignals[i].time) {
                    currentSignal = modeSignals[i];
                    break;
                }
            }

            if (currentSignal) {
                // Show signal if it's within 10 seconds of appearing,
                // OR if it's a persistent signal (Grace Period or Over Time), keep it visible
                const isPersistent = currentSignal.text.includes('Grace Period Ended') || currentSignal.text.includes('Over Time');
                
                if (seconds < currentSignal.time + 10 || isPersistent) {
                    document.getElementById('signal-icon').innerText = currentSignal.icon;
                    document.getElementById('signal-text').innerHTML = currentSignal.text;
                    document.getElementById('signal-container').style.opacity = '1';
                    
                    if (isPersistent) {
                        document.getElementById('signal-text').style.color = 'var(--danger)';
                    } else {
                        document.getElementById('signal-text').style.color = '#fbbf24';
                    }
                } else {
                    // Hide after 10 seconds
                    clearSignals();
                }
            } else if (seconds > 0) {
                clearSignals();
            }
        }

        // Initialize Lucide icons on load
        window.addEventListener('load', initIcons);
    </script>
</body>
</html>
